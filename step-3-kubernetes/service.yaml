# ==============================================================================
# SERVICE — сетевой доступ к подам
# ==============================================================================
# Pod'ы в Kubernetes временны: они создаются и удаляются, их IP меняется.
# Service решает эту проблему — он даёт стабильный сетевой адрес для группы подов.
#
# Service находит поды по меткам (labels) и балансирует трафик между ними.
# Тип ClusterIP — доступен только внутри кластера.
# На шаге 4 Envoy Gateway "смотрит" в этот Service и направляет внешний трафик.
# ==============================================================================

apiVersion: v1
kind: Service

metadata:
  name: coffee-shop-svc    # Имя Service (DNS-имя внутри кластера)
  namespace: workshop

spec:
  # --- Selector: на какие поды направлять трафик ---
  # Service ищет поды с меткой app=coffee-shop (та же метка, что в Deployment)
  selector:
    app: coffee-shop

  # --- Порты ---
  ports:
    - name: http
      protocol: TCP
      port: 80        # Порт Service (на этот порт приходит трафик)
      targetPort: 80  # Порт контейнера (куда перенаправляем)

  # --- Тип Service ---
  # ClusterIP — виртуальный IP, доступный только внутри кластера.
  # Другие типы:
  #   NodePort — открывает порт на всех узлах кластера
  #   LoadBalancer — создаёт внешний Load Balancer в облаке (Selectel поддерживает)
  # Мы используем ClusterIP, а внешний доступ организуем через Envoy Gateway на шаге 4
  type: ClusterIP
