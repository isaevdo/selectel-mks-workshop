# ==============================================================================
# PERSISTENTVOLUMECLAIM (PVC) — запрос на постоянное хранилище
# ==============================================================================
# PVC — это "заявка" на постоянный диск, который переживёт рестарты подов.
# Kubernetes автоматически создаёт диск в облаке через StorageClass.
#
# Типичное применение: базы данных, загруженные файлы, кэш.
#
# В этом воркшопе PVC не используется: статические файлы уже внутри
# образа nginx и постоянное хранилище не нужно.
# Файл оставлен как пример для справки.
# ==============================================================================

# apiVersion: v1
# kind: PersistentVolumeClaim
# metadata:
#   name: coffee-shop-pvc
#   namespace: workshop
# spec:
#   accessModes:
#     - ReadWriteOnce          # Диск монтируется к одному узлу
#   resources:
#     requests:
#       storage: 1Gi
#   storageClassName: fast.ru-9a  # SSD-диски в зоне ru-9a (Selectel)
